# Local infrastructure for the AI Invoice Clerk project.
#
# Two services:
#   postgres — one container, two databases:
#                invoice_clerk (our app, with pgvector for embeddings)
#                n8n           (n8n's internal storage)
#   n8n      — the automation engine, persisting to the n8n database
#
# Usage:  docker compose up -d
#         n8n UI      → http://localhost:5678
#         Postgres    → localhost:5432

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once on first startup: creates the n8n database + enables pgvector
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    # Lets workflows reach services on the host machine (our Next.js dev
    # server) via http://host.docker.internal:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Persist n8n's data in Postgres instead of the default SQLite,
      # so workflow state survives container rebuilds — the production setup.
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
    volumes:
      # Encryption key + local files n8n writes (binary data, etc.)
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
